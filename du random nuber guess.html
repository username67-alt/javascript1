<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Hádanie čísla</title>
</head>
<body>

<h2>Uhádni číslo od 1 do 10</h2>
<input type="number" id="tip" min="1" max="10">
<button onclick="skontroluj()">Skontroluj</button>

<p id="vysledok"></p>

<script>
let nahodneCislo = Math.floor(Math.random() * 10) + 1;

function skontroluj() {
    let tip = Number(document.getElementById("tip").value);
    let vysledok = document.getElementById("vysledok");

    if (tip === nahodneCislo) {
        vysledok.textContent = "Uhádol si";
    } else {
        vysledok.textContent = "Neuhádol si";
    }
}
</script>

</body>
</html>
