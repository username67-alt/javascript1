<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <style>
        body {
            display: flex;
            justify-content: flex-start; 
            align-items: flex-start;   
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #002fff 0%, #ff0000 100%);
            margin: 0;
        }
        .container {
            background: rgb(138, 222, 255);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgb(255, 0, 0);
            text-align: left;
            margin: 20px; 
        }
        h1 {
            color: #ffffff;
            margin-bottom: 20px;
        }
        #randomNumber {
            font-size: 100px;
            font-weight: bold;
            color: #ffadad;
            margin: 20px 0;
        }
        button {
            background-color: #811919;
            color: rgb(255, 255, 255);
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #764ba2;
        }
        .lol-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #ff6b35;
            color: rgb(255, 0, 0);
            padding: 20px 30px;
            border: none;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
        }
        .lol-btn:hover {
            background-color: #ff3c00;
        }
        .clock {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 255, 13, 0.6);
            color: #ff0000;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 25px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <button class="lol-btn" onclick="alert('Zajtra po teba príde neviditeľná ryba.')">prekvapenie</button>    <div id="clock" class="clock">--:--:--</div>    <div class="container">
        <h1>Random Number Generator</h1>
        <p>Random number between 1 and 100000000:</p>
        <div id="randomNumber">?</div>
        <button onclick="generateNumber()">number generator</button>
        <button onclick="changeBackground()">Change background</button>
        <button onclick="toggleRandomLetter()">Letter Randomiser</button>
        <div id="letterDisplay" style="margin-top:10px; font-size:40px; font-weight:bold"></div>
        <h2>kalkulačka</h2>
        <input type="number" id="num1" placeholder="First number" style="margin-right:10px;">
        <input type="number" id="num2" placeholder="Second number">
        <br>
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">*</button>
        <button onclick="calculate('/')">/</button>
        <button onclick="clearCalc()">Clear</button>
        <div id="calcResult" style="margin-top:10px; font-size:20px;"></div>
        <h2>Coin Fliper</h2>
        <button onclick="coinFlip()">Flip Coin</button>
        <div id="coinResult" style="margin-top:10px; font-size:20px;"></div>
        <textarea id="coinHistory" rows="10" cols="50" placeholder="Coin flip history will appear here..." style="margin-top:10px;"></textarea>
    </div>

     <script>
            
        function generateNumber() {
        const randomNum = Math.floor(Math.random() * 100000000) + 1;
        document.getElementById('randomNumber').textContent = randomNum;
        }

        generateNumber();
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            document.getElementById('clock').textContent = timeString;
        }

        function handleVisitCount() {
            const key = 'pageOpenCount';
            const current = parseInt(localStorage.getItem(key) || '0', 10) + 1;
            localStorage.setItem(key, current);

            if (current % 10 === 0) {
                // Every 10th page load, open a spinning fish GIF in a new tab
                window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1', '_blank');
            }
        }

        setInterval(updateClock, 1000);
        window.addEventListener('load', () => {
            updateClock();
            handleVisitCount();
        });

        function changeBackground() {
            const r = Math.floor(Math.random()*256);
            const g = Math.floor(Math.random()*256);
            const b = Math.floor(Math.random()*256);
            document.body.style.background = `rgb(${r},${g},${b})`;
        }

        let letterInterval = null;
        function toggleRandomLetter() {
            const display = document.getElementById('letterDisplay');
            if (letterInterval) {
                clearInterval(letterInterval);
                letterInterval = null;
            } else {
                letterInterval = setInterval(() => {
                    const charCode = Math.floor(Math.random() * 26) + 65;
                    display.textContent = String.fromCharCode(charCode);
                }, 200);
            }
        }

        function calculate(op) {
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            if (isNaN(n1) || isNaN(n2)) {
                document.getElementById('calcResult').textContent = 'Please enter valid numbers';
                return;
            }
            let result;
            switch(op) {
                case '+':
                    result = n1 + n2;
                    break;
                case '-':
                    result = n1 - n2;
                    break;
                case '*':
                    result = n1 * n2;
                    break;
                case '/':
                    if (n2 === 0) {
                        result = 'Cannot divide by zero you dissapointment!';
                    } else {
                        result = n1 / n2;
                    }
                    break;
            }
            document.getElementById('calcResult').textContent = 'Result: ' + result;
        }   

        function clearCalc() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('calcResult').textContent = '';
        }

        function coinFlip() {
            const rand = Math.random() * 100;
            let result;
            if (rand < 49) {
                result = 'Heads';
            } else if (rand < 98) {
                result = 'Tails';
            } else {
                result = 'Corner of wisdom';
            }
            document.getElementById('coinResult').textContent = 'Result: ' + result;
            const history = document.getElementById('coinHistory');
            const timestamp = new Date().toLocaleString();
            history.value += timestamp + ': ' + result + '\n';
        }
    </script>
</body>
</html>
