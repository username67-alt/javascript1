<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <style>
        body {
            display: flex;
            justify-content: flex-start; 
            align-items: flex-start;   
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #002fff 0%, #ff0000 100%);
            margin: 0;
        }
        .container {
            background: rgb(138, 222, 255);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgb(255, 0, 0);
            text-align: left;
            margin: 20px; 
        }
        h1 {
            color: #000000;
            margin-bottom: 20px;
        }
        #randomNumber {
            font-size: 100px;
            font-weight: bold;
            color: #581616;
            margin: 20px 0;
        }
        button {
            background-color: #811919;
            color: rgb(255, 255, 255);
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #764ba2;
        }
        .lol-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #ff6b35;
            color: rgb(255, 0, 0);
            padding: 40px 60px;
            border: none;
            border-radius: 5px;
            font-size: 40px;
            cursor: pointer;
            z-index: 100;
        }
        .lol-btn:hover {
            background-color: #ff3c00;
        }
        .clock {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 255, 13, 0.6);
            color: #ff0000;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 25px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <button class="lol-btn" onclick="handleSurpriseClick()">prekvapenie</button>    <div id="clock" class="clock">--:--:--</div>    <div class="container">
        <h1>Random Number Generator</h1>
        <p>Random number between 1 and 100000000:</p>
        <div id="randomNumber">?</div>
        <button onclick="generateNumber()">number generator</button>
        <button onclick="changeBackground()">Change background</button>
        <button onclick="toggleRandomLetter()">Letter Randomiser</button>
        <div id="letterDisplay" style="margin-top:10px; font-size:40px; font-weight:bold"></div>

        <h2>Random Picture</h2>
        <button onclick="randomPicture()">Show random picture</button>
        <div id="pictureContainer" style="margin-top:10px;">
            <img id="randomPic" src="" alt="Random picture" style="max-width:100%; border-radius:10px; display:none;" />
        </div>

        <h2>kalkulačka</h2>
        <input type="text" id="expression" placeholder="e.g. 2+2" style="width:220px; margin-right:10px;">
        <button onclick="calculate()">Calculate</button>
        <button onclick="clearCalc()">Clear</button>
        <div id="calcResult" style="margin-top:10px; font-size:20px;"></div>
        <h2>Coin Fliper</h2>
        <button onclick="coinFlip()">Flip Coin</button>
        <div id="coinResult" style="margin-top:10px; font-size:20px;"></div>
    </div>

     <script>
            
        function generateNumber() {
        const randomNum = Math.floor(Math.random() * 100000000) + 1;
        document.getElementById('randomNumber').textContent = randomNum;
        }

        generateNumber();
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            document.getElementById('clock').textContent = timeString;
        }

        function handleSurpriseClick() {
            const key = 'surpriseClickCount';
            const current = parseInt(localStorage.getItem(key) || '0', 10) + 1;
            localStorage.setItem(key, current);

            if (current % 10 === 0) {
                window.open('https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1', '_blank');
            } else {
                alert(`Kliknuté ${current}×. Na KAŽDÝ 10. klik sa otvorí prekvapenie!`);
            }
        }

        function randomPicture() {
            const pics = [
                'https://th.bing.com/th/id/OIP.KrelSUOAg_-vjEzdmmEg6wHaHi?w=185&h=189&c=7&r=0&o=7&pid=1.7&rm=3',
                'https://th.bing.com/th/id/OIP.f4T9xS6CPnnVp6ciZV8MMAHaEK?w=298&h=180&c=7&r=0&o=7&pid=1.7&rm=3',
                'https://i.pinimg.com/736x/c1/47/4f/c1474f5d75ae81200a464e81074182af.jpg',
                'https://th.bing.com/th/id/OIP.9GNskaLAKcdoao0R-lJ7VAHaHa?w=169&h=180&c=7&r=0&o=7&pid=1.7&rm=3',
                'https://th.bing.com/th/id/OIP.eHBibXuc3Tut3VtWj8nG7QHaEK?w=320&h=180&c=7&r=0&o=7&pid=1.7&rm=3',
                'https://th.bing.com/th/id/OIP.-58dZ6OR4ebrcbAnSxfXBAHaHa?w=156&h=180&c=7&r=0&o=7&pid=1.7&rm=3',
                'https://th.bing.com/th/id/OIP.rJPkeiV4g3kp44GBVxBLMAHaHa?w=174&h=180&c=7&r=0&o=7&pid=1.7&rm=3',
                'https://th.bing.com/th/id/OIP.wMkjTIW8BSSib6_1S5sHdwHaEK?w=299&h=180&c=7&r=0&o=7&pid=1.7&rm=3',
                'https://ruinmyweek.com/wp-content/uploads/2024/05/funny-memes-5-1-2429.webp',
                'https://preview.redd.it/r9h6azou7eu81.jpg?width=640&crop=smart&auto=webp&s=8b9c6de9947ee54012f6b10a1321a81471095738',
            ];
            const chosen = pics[Math.floor(Math.random() * pics.length)];
            const img = document.getElementById('randomPic');
            img.src = chosen;
            img.style.display = 'block';
        }

        function changeBackground() {
            const r = Math.floor(Math.random()*256);
            const g = Math.floor(Math.random()*256);
            const b = Math.floor(Math.random()*256);
            document.body.style.background = `rgb(${r},${g},${b})`;
        }

        function toggleRandomLetter() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const randomLetter = letters[Math.floor(Math.random() * letters.length)];
            const display = document.getElementById('letterDisplay');
            if (display.textContent === randomLetter) {
                display.textContent = '';
            } else {
                display.textContent = randomLetter;
            }
        }

        function calculate() {
            const expr = document.getElementById('expression').value.trim();
            if (!expr) {
                document.getElementById('calcResult').textContent = 'Enter an expression like 2+2';
                return;
            }
            try {
                const result = eval(expr);
                document.getElementById('calcResult').textContent = 'Result: ' + result;
            } catch {
                document.getElementById('calcResult').textContent = 'Invalid expression';
            }
        }

        function coinFlip() {
            const rand = Math.random() * 100;
            let result;
            if (rand < 49) {
                result = 'Heads';
            } else if (rand < 98) {
                result = 'Tails';
            } else {
                result = 'Corner of wisdom';
            }
            document.getElementById('coinResult').textContent = 'Result: ' + result;
            const timestamp = new Date().toLocaleString();
        }
    </script>
</body>
</html>
